services:
  sluice:
    build: 
      context: ../../
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - /home/skot/projects/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - SLUICE_MODEL_PATH=/models/qwen-3.6.gguf
      - SLUICE_TOTAL_POOL=98304
      - SLUICE_RESERVED_POOL=32768
