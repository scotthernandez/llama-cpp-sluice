# Promptfoo configuration for Llama-CPP Sluice
# Documentation: https://promptfoo.dev/docs/configuration/guide

prompts:
  - "Write a Python function to calculate the Fibonacci sequence."
  - "What is the capital of France?"
  - "Explain the concept of VRAM fragmentation in 50 words."
  - "{{messages}}"

providers:
  - id: openai:chat:sluice
    config:
      # Default Sluice port. Override via PROMPTFOO_OPENAI_API_BASE if needed.
      api_base: http://localhost:8001/v1
      api_key: unused

tests:
  - description: "Basic Code Generation"
    vars:
      messages:
        - role: user
          content: "Write a Python function to calculate Fibonacci."
    assert:
      - type: contains
        value: "def"
      - type: contains
        value: "return"

  - description: "General Knowledge"
    vars:
      messages:
        - role: user
          content: "What is the capital of France?"
    assert:
      - type: contains
        value: "Paris"

  - description: "Technical Conciseness"
    vars:
      messages:
        - role: user
          content: "Explain VRAM fragmentation in 50 words."
    assert:
      - type: latency
        threshold: 10000
